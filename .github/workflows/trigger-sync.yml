name: Trigger Downstream Sync

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Send Repository Dispatch Event
        run: |
          curl -H "Authorization: token ${{ secrets.SYNC_PAT }}" \
               -H "Accept: application/vnd.github.v3+json" \
               -X POST \
               -d '{"event_type": "upstream_push"}' \
               https://api.github.com/repos/SweetPotatoYee/izcc2026summer-website/dispatches